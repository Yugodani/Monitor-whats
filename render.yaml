services:
  - type: web
    name: monitor-whats
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn empresa_monitor.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: monitor-whats-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: monitor-whats-53jh.onrender.com,localhost,127.0.0.1
      - key: RENDER
        value: true

databases:
  - name: monitor-whats-db
    databaseName: monitor_whats
    user: monitor_whats_user